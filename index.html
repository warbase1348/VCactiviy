<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aquatic Life | Aesthetic Blue</title>
<style>
  /* --- Blue Aesthetic Palette --- */
  :root {
    --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    --glass-bg: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(255, 255, 255, 0.15);
    --accent-cyan: #00d2ff;
    --text-soft: #e0f7fa;
  }

  body {
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-gradient);
    background-attachment: fixed;
    color: var(--text-soft);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* --- Animated Background Bubbles --- */
  .bubble {
    position: fixed;
    bottom: -100px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 50%;
    z-index: -1;
    animation: rise 15s infinite ease-in;
  }

  @keyframes rise {
    0% { transform: translateY(0) scale(1); opacity: 0; }
    50% { opacity: 0.3; }
    100% { transform: translateY(-120vh) scale(1.5); opacity: 0; }
  }

  /* --- Navbar --- */
  nav {
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    background: rgba(0, 0, 0, 0.3);
    padding: 20px 0;
    text-align: center;
    border-bottom: 1px solid var(--glass-border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  nav a {
    color: var(--text-soft);
    margin: 0 25px;
    text-decoration: none;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: 0.4s;
    opacity: 0.8;
  }
  nav a:hover {
    color: var(--accent-cyan);
    opacity: 1;
    text-shadow: 0 0 8px var(--accent-cyan);
  }

  /* --- Main --- */
  main {
    flex: 1;
    padding: 80px 20px;
    max-width: 1200px;
    margin: 0 auto;
  }
  h2 { 
    font-size: 3rem; 
    font-weight: 200;
    margin-bottom: 50px; 
    text-align: center;
    letter-spacing: 8px;
    text-transform: uppercase;
  }

  /* --- Cards (Refraction/Glassmorphism) --- */
  .card-row {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
  }
  .card {
    width: 300px;
    background: var(--glass-bg);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid var(--glass-border);
    border-radius: 30px;
    overflow: hidden;
    transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  .card:hover { 
    transform: translateY(-15px) scale(1.02);
    border: 1px solid rgba(0, 210, 255, 0.4);
    box-shadow: 0 20px 40px rgba(0, 210, 255, 0.15);
  }
  .card img { 
    width: 100%; 
    height: 200px; 
    object-fit: cover;
    filter: brightness(0.8) contrast(1.1);
    transition: 0.5s;
  }
  .card:hover img { filter: brightness(1); }
  
  .card-content { padding: 30px; text-align: center; }
  .card h3 { 
    margin: 0 0 15px 0; 
    font-weight: 300; 
    font-size: 1.5rem;
    letter-spacing: 1px;
  }

  button {
    padding: 12px 25px;
    border: 1px solid var(--accent-cyan);
    background: transparent;
    color: var(--accent-cyan);
    border-radius: 50px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: 0.3s;
  }
  button:hover { 
    background: var(--accent-cyan);
    color: #0f2027;
    box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
  }

  /* --- Modal --- */
  .modal {
    display: none;
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(10, 25, 30, 0.8);
    backdrop-filter: blur(12px);
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }
  .modal-box {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid var(--glass-border);
    padding: 40px;
    border-radius: 40px;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  }
  .close {
    cursor: pointer;
    font-size: 30px;
    float: right;
    margin-top: -20px;
    color: var(--accent-cyan);
  }

  /* --- Footer --- */
  footer {
    padding: 40px;
    text-align: center;
    font-size: 0.8rem;
    letter-spacing: 2px;
    opacity: 0.6;
  }
</style>
</head>
<body>

<div class="bubble" style="left: 10%; width: 40px; height: 40px; animation-delay: 0s;"></div>
<div class="bubble" style="left: 30%; width: 20px; height: 20px; animation-delay: 2s;"></div>
<div class="bubble" style="left: 55%; width: 60px; height: 60px; animation-delay: 4s;"></div>
<div class="bubble" style="left: 80%; width: 30px; height: 30px; animation-delay: 1s;"></div>

<nav>
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Explore</a>
  <a href="#">Contact</a>
</nav>

<main>
  <h2>The Deep Blue</h2>
  <div class="card-row">
    <div class="card">
      <img src="3.png" alt="Baby Shark">
      <div class="card-content">
        <h3>Baby Shark</h3>
        <button onclick="openModal('Baby Shark','Navigating the shallow reefs with curiosity and grace.')">View Details</button>
      </div>
    </div>
    <div class="card">
      <img src="1.png" alt="Daddy Shark">
      <div class="card-content">
        <h3>Daddy Shark</h3>
        <button onclick="openModal('Daddy Shark','The silent guardian of the deep, patrolling the outer ridges.')">View Details</button>
      </div>
    </div>
    <div class="card">
      <img src="2.png" alt="Mommy Shark">
      <div class="card-content">
        <h3>Mommy Shark</h3>
        <button onclick="openModal('Mommy Shark','The heartbeat of the ocean, ensuring the balance of life remains.')">View Details</button>
      </div>
    </div>
  </div>
</main>

<div id="modal" class="modal">
  <div class="modal-box">
    <span class="close" onclick="closeModal()">&times;</span>
    <h3 id="modalTitle" style="color: var(--accent-cyan); font-weight: 300;"></h3>
    <p id="modalText" style="line-height: 1.6;"></p>
  </div>
</div>

<footer>© 2026 AQUATIC LIFE • ESTABLISHED IN THE DEPTHS</footer>

<script>
function openModal(title, text){
  document.getElementById("modalTitle").innerText = title;
  document.getElementById("modalText").innerText = text;
  document.getElementById("modal").style.display = "flex";
}
function closeModal(){
  document.getElementById("modal").style.display = "none";
}
window.onclick = function(e) {
  if (e.target == document.getElementById("modal")) closeModal();
}
</script>

</body>
</html>
